# RDF Query Pipeline Configuration - Explicit File List
# This config fetches specific files by their hardcoded paths instead of scanning directories.

[pipeline]
name = "cim-igm-explicit-files"
parallel = true
max_concurrent = 10

# =============================================================================
# SOURCES - Explicit list of all files from examples/data
# =============================================================================

